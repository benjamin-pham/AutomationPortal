name: automation-portal

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:17
    container_name: ap_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myprojectdemo}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Admin@123456}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ap_network

  # ── Seq (structured log viewer) ───────────────────────────────────────────────
  seq:
    image: datalust/seq:latest
    container_name: ap_seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "123456"
    ports:
      - "${SEQ_UI_PORT:-5341}:80"
    volumes:
      - seq_data:/data
    networks:
      - ap_network

  # ── .NET 10 Backend API ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ap_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Database: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-myprojectdemo};
        Username=${POSTGRES_USER:-admin};Password=${POSTGRES_PASSWORD:-Admin@123456}
      Authentication__Jwt__SecretKey: ${JWT_SECRET_KEY:-your-super-secret-key-at-least-32-chars}
      Authentication__Jwt__Issuer: ${JWT_ISSUER:-AutomationPortal}
      Authentication__Jwt__Audience: ${JWT_AUDIENCE:-AutomationPortal}
      Serilog__WriteTo__3__Args__serverUrl: http://seq:5341
      Serilog__WriteTo__3__Args__apiKey: ${SEQ_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - backend_logs:/app/logs
    networks:
      - ap_network

  # ── Next.js 16 Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-http://backend:5000}
    container_name: ap_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_URL: ${API_URL:-http://backend:5000}
      HOSTNAME: "0.0.0.0"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - ap_network

volumes:
  postgres_data:
  seq_data:
  backend_logs:

networks:
  ap_network:
    driver: bridge
