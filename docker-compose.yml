name: automation-portal

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network

  # ── Seq (structured log viewer) ───────────────────────────────────────────────
  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    volumes:
      - seq_data:/data
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.ap-seq-web.rule=Host(`seq.auto.matbaohosting.com`)"
      - "traefik.http.routers.ap-seq-web.entrypoints=web"
      - "traefik.http.routers.ap-seq-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.ap-seq-web.service=ap-seq-web"
      - "traefik.http.services.ap-seq-web.loadbalancer.server.port=80"
      # HTTPS
      - "traefik.http.routers.ap-seq-websecure.rule=Host(`seq.auto.matbaohosting.com`)"
      - "traefik.http.routers.ap-seq-websecure.entrypoints=websecure"
      - "traefik.http.routers.ap-seq-websecure.tls=true"
      - "traefik.http.routers.ap-seq-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ap-seq-websecure.service=ap-seq-websecure"
      - "traefik.http.services.ap-seq-websecure.loadbalancer.server.port=80"

  # ── .NET 10 Backend API ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Database: >-
        Host=db;Port=5432;Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Authentication__Jwt__SecretKey: ${JWT_SECRET_KEY}
      Authentication__Jwt__Issuer: ${JWT_ISSUER}
      Authentication__Jwt__Audience: ${JWT_AUDIENCE}
      Serilog__WriteTo__3__Args__serverUrl: http://seq:80
      Serilog__WriteTo__3__Args__apiKey: ${SEQ_API_KEY}
    volumes:
      - backend_logs:/app/logs
    networks:
      - dokploy-network
    depends_on:
      - db
      - seq
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.ap-backend-web.rule=Host(`api.auto.matbaohosting.com`)"
      - "traefik.http.routers.ap-backend-web.entrypoints=web"
      - "traefik.http.routers.ap-backend-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.ap-backend-web.service=ap-backend-web"
      - "traefik.http.services.ap-backend-web.loadbalancer.server.port=5000"
      # HTTPS
      - "traefik.http.routers.ap-backend-websecure.rule=Host(`api.auto.matbaohosting.com`)"
      - "traefik.http.routers.ap-backend-websecure.entrypoints=websecure"
      - "traefik.http.routers.ap-backend-websecure.tls=true"
      - "traefik.http.routers.ap-backend-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ap-backend-websecure.service=ap-backend-websecure"
      - "traefik.http.services.ap-backend-websecure.loadbalancer.server.port=5000"

  # ── Next.js 16 Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: https://api.auto.matbaohosting.com
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_URL: https://api.auto.matbaohosting.com
      HOSTNAME: "0.0.0.0"
    networks:
      - dokploy-network
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.ap-frontend-web.rule=Host(`auto.matbaohosting.com`)"
      - "traefik.http.routers.ap-frontend-web.entrypoints=web"
      - "traefik.http.routers.ap-frontend-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.ap-frontend-web.service=ap-frontend-web"
      - "traefik.http.services.ap-frontend-web.loadbalancer.server.port=3000"
      # HTTPS
      - "traefik.http.routers.ap-frontend-websecure.rule=Host(`auto.matbaohosting.com`)"
      - "traefik.http.routers.ap-frontend-websecure.entrypoints=websecure"
      - "traefik.http.routers.ap-frontend-websecure.tls=true"
      - "traefik.http.routers.ap-frontend-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ap-frontend-websecure.service=ap-frontend-websecure"
      - "traefik.http.services.ap-frontend-websecure.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  seq_data:
  backend_logs:

networks:
  dokploy-network:
    external: true
